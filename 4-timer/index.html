<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./time.css">
    <title>Продвинутый JS</title>
</head>

<body >
    <div class="image">
        <img src="../logo.svg" alt="" />
    </div>
    <h1>До нового года осталось:</h1>
    <div class="timer">
        <div class="timer__item timer__month">00</div>
        <div class="separator__month">месяцев</div>
        <div class="timer__item timer__days">00</div>
        <div class="separator__days">дней</div>
        <div class="timer__item timer__hours">00</div>
        <div class="separator__hourses">часов</div>
        <div class="timer__item timer__minutes">00</div>
        <div class="separator__minutes">минут</div>
        <div class="timer__item timer__seconds">00</div>
        <div class="separator__seconds">секунд</div>
    </div>
    <script src="./app.js"></script>
</body>

</html>
